<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('dealscannr.theme')
          if (raw) {
            var j = JSON.parse(raw)
            var t = j.state && j.state.theme
            if (t === 'light' || t === 'dark') {
              document.documentElement.setAttribute('data-theme', t)
              return
            }
          }
        } catch (e) {}
        var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEALSCANNR — Due diligence in 60 seconds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400;1,9..40,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
